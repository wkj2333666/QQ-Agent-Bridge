# NapCatQQ gateway for qq-agent-bridge.
# Current bridge listens on 127.0.0.1:38765/onebot, so host networking
# keeps reverse WebSocket setup simple during bring-up.

services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: qqbot-napcat
    restart: "no"
    network_mode: host
    environment:
      NAPCAT_UID: "${NAPCAT_UID:-1000}"
      NAPCAT_GID: "${NAPCAT_GID:-1000}"
    volumes:
      - ./data/qq:/app/.config/QQ
      - ./config:/app/napcat/config
      - ./plugins:/app/napcat/plugins
      # NapCat uploads local file:// paths from inside the container. The
      # container target must match agent.default_workspace exactly.
      - ${BRIDGE_WORKSPACE_ABS:-/opt/qq-agent-bridge/workspace}:${BRIDGE_WORKSPACE_ABS:-/opt/qq-agent-bridge/workspace}:ro
