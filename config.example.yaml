# QQ Agent Bridge - safe defaults, deny by default
# Copy to config.yaml and edit. Never commit real tokens or QR data.

owners:
  - "1000000001"   # your QQ as owner

allowed_users:
  - "1000000001"   # private-chat users; allowed group members can use read-only commands when mentioning bot

allowed_groups: []   # add group ids as strings when ready, e.g. "123456"

workspaces:
  "/opt/qq-agent-bridge/workspace": true

commands:
  # Each value is: user (all authorized users), owner (owners only), or disabled.
  ask: user      # read / explain / propose
  plan: user     # read-only planning, no file edits
  search: user   # read-only literal search in configured workspace
  task: user     # general agent task entry, no existing workspace file edits
  code: owner    # owner-only workspace edits, still subject to confirmation
  status: user
  help: user
  permission: user # view group command overrides; only group owners may change them
  schedule: user # schedule viewing; group mutations remain owner-only
  profile: user  # viewing; group edits remain owner-only
  mode: user     # viewing; only owners may change a group's mode
  reset: owner   # clears current conversation memory
  stop: owner
  approve: owner
  reload: owner   # reloads config.yaml without reconnecting OneBot
  shell: disabled # dangerous shell entry; keep disabled unless deliberately enabled
  groups: {}
  # Per-group overrides, for example:
  # groups:
  #   "123456":
  #     task: disabled
  #     search: owner

dangerous_requires_confirm: true
max_runtime_seconds: 1800
max_output_chars: 4000
max_finished_jobs: 200
max_seen_messages: 1000

memory:
  enabled: true
  max_messages: 32
  max_chars: 6000

ambient_memory:
  enabled: true
  allowed_groups: []        # empty = reuse allowed_groups; set explicit group ids to narrow scope
  max_messages: 8
  max_chars: 1200
  max_message_chars: 180
  max_age_seconds: 900
  min_chars: 4
  ignored_prefixes: ["/", "／", "!", "！"]

resources:
  enabled: true
  root: "downloads/qq-agent-bridge"
  local_media_roots: [] # trusted OneBot directories allowed to supply local audio records
  max_items: 4
  max_bytes: 8388608
  max_total_bytes: 20971520
  cache_enabled: true
  cache_ttl_seconds: 600
  cache_max_items: 4
  # GIF/APNG/animated WebP are probed and sampled before the Agent runs.
  # ffmpeg/ffprobe are preferred; the locked Pillow worker handles decoder gaps.
  animation_enabled: true
  animation_ffmpeg_binary: "ffmpeg"
  animation_ffprobe_binary: "ffprobe"
  animation_max_frames: 8
  animation_max_duration_seconds: 30
  animation_max_dimension: 1024
  animation_max_source_pixels: 40000000
  animation_timeout_seconds: 20
  allowed_kinds: ["image", "file", "audio", "voice", "video", "url", "forward"]

# Whisper voice transcription; keep disabled until the binary and model are configured.
whisper:
  enabled: false
  # Use absolute paths; the installer publishes these stable current targets.
  # binary: "/home/alice/.local/share/qq-agent-bridge/asr/current/bin/whisper-cli"
  # model: "/home/alice/.local/share/qq-agent-bridge/asr/current/models/ggml-tiny-q8_0.bin"
  binary: ""
  model: ""
  language: "zh"
  timeout_seconds: 90
  max_concurrent: 1
  cache_enabled: true
  cache_root: "data/whisper-cache"
  cache_ttl_seconds: 86400
  cache_max_items: 256

progress:
  enabled: true
  first_heartbeat_seconds: 30
  heartbeat_seconds: 45
  max_heartbeat_messages: 6
  min_progress_interval_seconds: 8
  max_progress_messages: 8
  max_progress_chars: 240

scheduler:
  enabled: false                 # set true after checking timezone and permissions
  database_path: "data/schedules.sqlite3" # changing this at runtime requires a bridge restart
  timezone: "Asia/Shanghai"
  # Non-owner schedule requests get one combined parse + safety review.
  # Owner requests skip this extra safety gate.
  natural_language_enabled: true
  natural_language_model: "auto" # model interprets time; bridge validates the RRULE
  natural_language_timeout_seconds: 60
  natural_language_progress_seconds: 15
  allow_private_users: true
  allow_unbounded: true          # permits arbitrary recurrences without COUNT/UNTIL
  min_interval_seconds: 60
  max_schedules_per_chat: 20
  max_concurrent_runs: 4
  max_run_history_per_schedule: 100
  max_occurrences: 100           # cap for finite COUNT/UNTIL schedules
  max_payload_chars: 2000
  misfire_grace_seconds: 300
  max_consecutive_failures: 5
  debug: false

proactive:
  enabled: true
  debug: false
  allowed_groups: []       # empty = reuse allowed_groups; set explicit group ids for tighter rollout
  batch_seconds: 8
  min_messages: 2
  max_batch_messages: 8
  cooldown_seconds: 16
  quiet_after_bot_seconds: 16
  max_per_hour: 180
  max_prompt_chars: 1200
  max_reply_chars: 160
  max_reply_messages: 3
  reply_message_delay_seconds: 0.6
  model: "auto"
  blacklist_keywords: ["别插嘴", "不要插嘴", "闭嘴", "机器人别说话"]
  ignored_prefixes: ["/"]

profiles:
  default: ""  # empty = use built-in QQ bot identity/profile
  groups:
    # "123456": |
    #   你是这个群里的项目管家。说话轻松、短句优先，主动把问题拆成可执行步骤。
  users:
    # "1000000001": |
    #   你是私聊里的学习搭子。优先解释思路，语气耐心，不替用户做未授权的决定。

mention_modes:
  default: chat  # safe choices: chat, ask, plan, task
  groups:
    # "123456": task  # direct task execution; chat keeps the interjection decision

# OneBot
onebot:
  host: "127.0.0.1"
  port: 8765
  path: "/onebot"
  access_token: "change-this-to-strong-token"  # must match gateway config

# Agent runtime - choose explicitly before running
agent:
  runtime: ""  # required: "cursor-cli" or "custom-cli"
  binary: ""   # cursor-cli default binary is cursor-agent when left empty
  # custom-cli command templates. Supported placeholders:
  # {prompt}, {workspace}, {mode}, {model}, {stream}
  # Example:
  # command:
  #   ask: ["your-agent", "--mode", "{mode}", "--model", "{model}", "{prompt}"]
  #   plan: ["your-agent", "--mode", "{mode}", "--model", "{model}", "{prompt}"]
  #   task: ["your-agent", "--workspace", "{workspace}", "{prompt}"]
  #   code: ["your-agent", "--workspace", "{workspace}", "{prompt}"]
  # Agent processes must run in the existing micromamba base environment.
  # Do not disable this guard or create a project-local venv from an Agent task.
  command: {}
  default_workspace: "/opt/qq-agent-bridge/workspace"
  env_runner: "micromamba"
  env_name: "base"
  require_env: true
  use_bwrap: true
  share_network: true  # required for web search; keep false for offline tasks
  bwrap_binary: "bwrap"
  force_task_tools: true
  # Persistent disk-backed state outside the Agent workspace. Keep it under this app state root;
  # do not move it to a small tmpfs such as /tmp on long-running deployments.
  sandbox_home: "~/.local/state/qq-agent-bridge/agent-home"
  chat_model: "auto"                  # fast route for short QQ replies
  task_model: "composer"              # stronger tool-using route for QQ tasks
  max_concurrent_jobs: 2
  env_allowlist:
    - "PATH"
    - "HOME"
    - "USER"
  max_runtime_seconds: 1800
  max_output_chars: 4000
  # Agent subprocess traces are private local diagnostics and are disabled by default.
  # They never include the original prompt; enable only on a trusted machine.
  trace_enabled: false
  trace_root: "runtime/agent-traces"
  trace_max_bytes: 5242880
  trace_max_line_chars: 2000

# Bot self
bot:
  self_id: ""  # fill after login, e.g. "1234567890"
  mention_name: ""  # optional display name; plain text "@name" is not treated as a real mention
  reply_chunk_delay_seconds: 0.2  # small pause between split long-message chunks

# Logging
log_level: "INFO"
